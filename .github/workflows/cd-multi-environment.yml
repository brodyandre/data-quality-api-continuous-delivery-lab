name: CD Multi Environment

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
      - name: Build Docker image
        run: docker build -t data-quality-api:cd .

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: build
    environment: development
    env:
      APP_ENV: ${{ vars.APP_ENV }}
      QUALITY_THRESHOLD: ${{ vars.QUALITY_THRESHOLD }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Print environment information
        shell: bash
        run: |
          APP_ENV_VALUE="${APP_ENV:-development}"
          QUALITY_THRESHOLD_VALUE="${QUALITY_THRESHOLD:-80}"
          LOG_LEVEL_VALUE="${LOG_LEVEL:-debug}"

          echo "GitHub Environment: development"
          echo "APP_ENV=${APP_ENV_VALUE}"
          echo "QUALITY_THRESHOLD=${QUALITY_THRESHOLD_VALUE}"
          echo "LOG_LEVEL=${LOG_LEVEL_VALUE}"
      - name: Simulate deployment
        run: kubectl kustomize k8s/overlays/development > development-manifests.yaml

  deploy-staging:
    name: Deploy Staging
    needs: deploy-development
    runs-on: ubuntu-latest
    environment: staging
    env:
      APP_ENV: ${{ vars.APP_ENV }}
      QUALITY_THRESHOLD: ${{ vars.QUALITY_THRESHOLD }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Print environment information
        shell: bash
        run: |
          APP_ENV_VALUE="${APP_ENV:-staging}"
          QUALITY_THRESHOLD_VALUE="${QUALITY_THRESHOLD:-90}"
          LOG_LEVEL_VALUE="${LOG_LEVEL:-info}"

          echo "GitHub Environment: staging"
          echo "APP_ENV=${APP_ENV_VALUE}"
          echo "QUALITY_THRESHOLD=${QUALITY_THRESHOLD_VALUE}"
          echo "LOG_LEVEL=${LOG_LEVEL_VALUE}"
      - name: Simulate deployment
        run: kubectl kustomize k8s/overlays/staging > staging-manifests.yaml

  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: ${{ vars.APP_ENV }}
      QUALITY_THRESHOLD: ${{ vars.QUALITY_THRESHOLD }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Print environment information
        shell: bash
        run: |
          APP_ENV_VALUE="${APP_ENV:-production}"
          QUALITY_THRESHOLD_VALUE="${QUALITY_THRESHOLD:-95}"
          LOG_LEVEL_VALUE="${LOG_LEVEL:-warning}"

          echo "GitHub Environment: production"
          echo "APP_ENV=${APP_ENV_VALUE}"
          echo "QUALITY_THRESHOLD=${QUALITY_THRESHOLD_VALUE}"
          echo "LOG_LEVEL=${LOG_LEVEL_VALUE}"
      - name: Simulate deployment
        run: kubectl kustomize k8s/overlays/production > production-manifests.yaml
